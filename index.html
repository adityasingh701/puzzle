<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Color Legend 100</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{background:#0f0f0f;color:#fff;text-align:center}
.topbar{
display:flex;
justify-content:space-between;
padding:12px;
background:#181818;
position:sticky;
top:0;
z-index:100;
font-size:14px;
font-weight:bold;
}
  <!-- adityasinghprogrammed -->
.page{padding:20px}
.hidden{display:none}
.logo{
font-size:34px;
font-weight:bold;
margin-top:30px;
color:#b06cff;
}
.btn{
width:100%;
max-width:320px;
padding:14px;
margin:8px auto;
display:block;
background:#7e22ce;
border:none;
color:white;
font-size:16px;
border-radius:12px;
cursor:pointer;
}
.btn:hover{opacity:.9}
#grid{
display:grid;
gap:4px;
justify-content:center;
margin-top:20px;
}
.box{
width:100%;
max-width:50px;
aspect-ratio:1/1;
border-radius:8px;
cursor:pointer;
transition:.2s;
}
.box:hover{
transform:scale(1.05);
}
.level-grid{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:10px;
margin-top:20px;
}
.level-btn{
padding:12px;
border:none;
border-radius:10px;
background:#222;
color:white;
cursor:pointer;
}
.unlocked{background:#7e22ce}
.locked{opacity:.3}
.card{
background:#1a1a1a;
padding:20px;
border-radius:12px;
margin-top:20px;
}
input{
width:100%;
padding:12px;
border-radius:10px;
border:none;
}
.trophy{
font-size:80px;
margin-top:40px;
}
</style>
</head>

<body>

<div class="topbar">
<div>🏆 <span id="currentLevel">1</span></div>
<div>❤️ <span id="lives">3</span></div>
<div>🪙 <span id="coins">200</span></div>
<div>⏱ <span id="timer">00:00</span></div>
</div>

<div id="homePage" class="page">
<div class="logo">COLOR LEGEND 100</div>

<button class="btn" onclick="continueGame()">▶ Continue</button>
<button class="btn" onclick="openLevels()">📚 Levels</button>
<button class="btn" onclick="openShop()">🪙 Redeem Coins</button>
<button class="btn" onclick="location.href='contacts.html'">
📧 Contact </button>
</div>

<div id="gamePage" class="page hidden">
<h2 id="levelTitle">Level 1</h2>
<!-- adityasinghprogrammed -->
<button class="btn" onclick="useHint()">
💡 Hint
</button>

<div id="grid"></div>
</div>

<div id="levelsPage" class="page hidden">
<h2>Levels</h2>
<div id="levelGrid" class="level-grid"></div>

<button class="btn" onclick="goHome()">Back</button>
</div>

<div id="shopPage" class="page hidden">

<h2>Buy Coins</h2>

<div class="card">

<h3>50 Coins = INR 5 </h3>

<br>

<h4>Contact me for payment details <a href="contacts.html"><b>Check Out.</b></a> </h4>

<br>

<input
id="redeemInput"
placeholder="Redeem Code">

<br><br>

<button class="btn"
onclick="redeemCode()">
Redeem
</button>

</div>
<!-- adityasinghprogrammed -->
<button class="btn"
onclick="goHome()">
Back
</button>

</div>




  

<div id="trophyPage"
class="page hidden">

<div class="trophy">👑</div>

<h1>LEGEND PLAYER</h1>

<br>

<p>You completed all 100 levels. Contact us for your prize money (₹50)</p>

<br>

<button class="btn"
onclick="goHome()">
Home
</button>

</div>

<script>

let currentLevel =
parseInt(localStorage.getItem("currentLevel")) || 1;

let unlockedLevel =
parseInt(localStorage.getItem("unlockedLevel")) || 1;

let coins =
parseInt(localStorage.getItem("coins")) || 200;
  
let bestTime =
parseInt(localStorage.getItem("bestTime")) || 0;

let lives = 3;

let oddIndex = 0;

let timerSeconds = 0;

let timerInterval;

const currentLevelEl =
document.getElementById("currentLevel");

const coinsEl =
document.getElementById("coins");

const livesEl =
document.getElementById("lives");

const timerEl =
document.getElementById("timer");

const levelTitle =
document.getElementById("levelTitle");

const grid =
document.getElementById("grid");

updateUI();

function updateUI(){

currentLevelEl.innerText =
currentLevel;

coinsEl.innerText =
coins;

livesEl.innerText =
lives;

}

function saveData(){

localStorage.setItem(
"currentLevel",
currentLevel
);

localStorage.setItem(
"unlockedLevel",
unlockedLevel
);

localStorage.setItem(
"coins",
coins
);

localStorage.setItem(
"bestTime",
bestTime
);

}
<!-- adityasinghprogrammed -->
function hideAll(){

document.querySelectorAll(".page")
.forEach(el=>el.classList.add("hidden"));

}

function goHome(){

hideAll();

document
.getElementById("homePage")
.classList.remove("hidden");

}

function openShop(){

hideAll();

document
.getElementById("shopPage")
.classList.remove("hidden");

}
<!-- adityasinghprogrammed -->
function openContact(){
window.location.href="contacts.html";
}
function continueGame(){

hideAll();

document
.getElementById("gamePage")
.classList.remove("hidden");

startTimer();

loadLevel(currentLevel);

}

function startTimer(){

clearInterval(timerInterval);

timerInterval =
setInterval(()=>{

timerSeconds++;

let min =
Math.floor(timerSeconds/60);

let sec =
timerSeconds%60;

timerEl.innerText =
String(min).padStart(2,"0")
+
":"
+
String(sec).padStart(2,"0");

},1000);

}

function getGridSize(level){

if(level<=10)return 3;
if(level<=20)return 4;
if(level<=30)return 5;
if(level<=40)return 6;
if(level<=50)return 7;
if(level<=60)return 8;
if(level<=79)return 9;
return 10;

}

function getDifference(level){

if(level>=95)return 1;
if(level>=80)return 2;
if(level>=70)return 3;
if(level>=60)return 4;
if(level>=50)return 6;
if(level>=40)return 8;
if(level>=30)return 12;
if(level>=20)return 18;
if(level>=10)return 25;
return 40;

}

function randomColor(){

return{

r:Math.floor(Math.random()*200)+20,
g:Math.floor(Math.random()*200)+20,
b:Math.floor(Math.random()*200)+20

};

}

function loadLevel(level){

levelTitle.innerText =
"Level " + level;

grid.innerHTML="";

const size =
getGridSize(level);

grid.style.gridTemplateColumns =
`repeat(${size},1fr)`;

const total =
size*size;

oddIndex =
Math.floor(
Math.random()*total
);

const diff =
getDifference(level);

const base =
randomColor();

for(let i=0;i<total;i++){

const box =
document.createElement("div");

box.className="box";

let r=base.r;
let g=base.g;
let b=base.b;

if(i===oddIndex){

r=Math.min(255,r+diff);
g=Math.min(255,g+diff);
b=Math.min(255,b+diff);

}

box.style.background=
`rgb(${r},${g},${b})`;

if(level >= 90){

box.style.maxWidth = "35px";

}else if(level >= 80){

box.style.maxWidth = "40px";

}

box.onclick=
()=>checkBox(i);

grid.appendChild(box);

}

}
/* adityasinghprogrammed */
function checkBox(index){

if(index===oddIndex){

levelCompleted();

}else{

wrongClick();

}

}

function wrongClick(){

lives--;

updateUI();

if(lives<=0){

gameOver();

}

}

  function getResetLevel(level){

if(level >= 99) return 80;
if(level >= 95) return 70;
if(level >= 90) return 60;
if(level >= 80) return 50;
if(level >= 70) return 45;
if(level >= 60) return 40;
if(level >= 50) return 30;
if(level >= 40) return 20;
if(level >= 30) return 10;
if(level >= 20) return 5;
if(level >= 10) return 1;

return 1;

  }

function gameOver(){

clearInterval(timerInterval);

if(bestTime === 0 || timerSeconds < bestTime){

bestTime = timerSeconds;

}

saveData();

alert(
"Game Over!\n\n" +
"Reached Level: " +
currentLevel +
"\nTime: " +
timerEl.innerText
);

const resetLevel = getResetLevel(currentLevel);

currentLevel = resetLevel;
unlockedLevel = resetLevel;

lives = 10;

timerSeconds = 0;

timerEl.innerText = "00:00";

saveData();

goHome();

updateUI();
  
}

function levelCompleted(){

coins += 0;

if(currentLevel < 100){

currentLevel++;

if(currentLevel > unlockedLevel){
unlockedLevel = currentLevel;
}

saveData();
updateUI();
loadLevel(currentLevel);

}else{

saveData();
updateUI();
showLegend();

}

}

function getHintCost(){

if(currentLevel>=90)
return 150;

if(currentLevel>=80)
return 100;

return 50;

}

function useHint(){

const cost =
getHintCost();

if(coins<cost){

alert(
"Need " +
cost +
" coins"
);

return;

}

coins -= cost;

saveData();

updateUI();

const target =
grid.children[oddIndex];

target.style.border=
"4px solid white";

target.style.boxShadow=
"0 0 20px white";

setTimeout(()=>{

target.style.border=
"none";

target.style.boxShadow=
"none";

},1200);

}

function showLegend(){

hideAll();

document
.getElementById("trophyPage")
.classList.remove("hidden");

}
<!-- adityasinghprogrammed -->
function openLevels(){

hideAll();

document
.getElementById("levelsPage")
.classList.remove("hidden");

renderLevels();

}

function renderLevels(){

const levelGrid =
document.getElementById("levelGrid");

levelGrid.innerHTML="";

for(let i=1;i<=100;i++){

const btn =
document.createElement("button");

btn.innerText=i;

btn.className=
"level-btn";

if(i<=unlockedLevel){

btn.classList.add(
"unlocked"
);

btn.onclick=()=>{

currentLevel=i;

continueGame();

};

}else{

btn.classList.add(
"locked"
);

}

levelGrid.appendChild(btn);

}

}

const redeemCodes={

SOMU7:50,
ADI7:20000
};

function redeemCode(){

const code =
document
.getElementById("redeemInput")
.value
.trim()
.toUpperCase();

if(localStorage.getItem("used_" + code)){

alert("Code already used");
return;

}

if(redeemCodes[code]){

coins += redeemCodes[code];

localStorage.setItem(
"used_" + code,
"true"
);

saveData();

updateUI();

alert(
"Added " +
redeemCodes[code] +
" coins"
);

}else{

alert("Invalid code");

}

}

window.addEventListener(
"beforeunload",
saveData
);

</script>
<!-- adityasinghprogrammed -->
</body>
</html>
